<section class="section" style="min-height:80vh;display:flex;align-items:center;padding-top:6rem;">
  <div class="container" style="text-align:center;max-width:640px;">
    <span class="eyebrow">Booking</span>
    <h1 class="display-lg">Request <em>received.</em></h1>
    <p style="margin:1.5rem 0;color:var(--cream-dim);font-size:1.1rem;">
      Thanks for booking with us! We've sent your request to Simmo and he'll confirm
      your dates within 24 hours. You'll hear back by email.
    </p>
    <p id="summary" style="margin:2rem 0;color:var(--cream-dim);"></p>
    <div class="hero-actions" style="justify-content:center;">

<footer>
  <div class="footer-inner">
    <div class="footer-brand"><h3>KnK Inn</h3><p>96 Đề Thám, District 1, Hồ Chí Minh City.</p></div>
  </div>
</footer>

<script>
  const q = new URLSearchParams(location.search);
  const nights = parseInt(q.get("nights") || "0", 10);
  const total = q.get("total") || "";
  if (nights || total) {
    const bits = [];
    if (nights) bits.push(nights + " night" + (nights === 1 ? "" : "s"));
    if (total)  bits.push("Estimated total " + total);
    document.getElementById("summary").textContent = bits.join(" · ");
  }
</script>
